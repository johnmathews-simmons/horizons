; Alembic config — workspace root.
;
; The migration tree lives inside horizons-core (the package that owns the
; database layer). The DB URL is sourced from the HORIZONS_DB_URL
; environment variable in env.py — do not put credentials here.

[alembic]
script_location = packages/horizons-core/migrations
prepend_sys_path = .
path_separator = os
file_template = %%(rev)s_%%(slug)s
version_path_separator = os
output_encoding = utf-8

# sqlalchemy.url is set programmatically by env.py from $HORIZONS_DB_URL.

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
