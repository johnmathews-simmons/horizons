# Curated set (WU3.5 → WU8.5). Read by scripts/seed_curated_set.py.
#
# WU8.5 expansion. The full 31-fixture inventory under data/samples/ is
# now seeded. Each demo subscription (UK/BANKING and EU/BANKING) sees
# >=10 documents via per-doc ``jurisdiction:`` relabels. Fixtures with
# no demo relabel keep their original ISO-2 jurisdiction and are
# visible to admin only.
#
# Token convention: jurisdictions are ISO-2 (matching ``fixtures.json``)
# plus the synthetic relabels UK and EU used by the demo accounts.
# Per-doc ``jurisdiction:`` overrides relabel a captured fixture onto a
# demo token without forking the upstream capture. Sectors use the
# canonical taxonomy documented in
# ``packages/horizons-core/src/horizons_core/db/schema.md`` (BANKING,
# INSURANCE, employment, tax, consumer-protection, corporate-
# governance, …). The WU8.1 demo accounts subscribe to BANKING only,
# so every relabel below sets ``sector: BANKING`` regardless of the
# fixture's editorial origin — the relabel cluster makes the demo
# subscriptions visibly populated rather than honest about source
# taxonomy. Honest-sector docs (no relabel) stay on their native sector
# so admin can still see the taxonomy mix.

jurisdictions: [IE, GB, UK, EU, BE, AT, DE, FR, IT, ES, DK, FI, GR, AU, FJ, AD, AE, CY, GE, BR, CN, CH, CZ, HR, HU, JP, KR, LU, LV, MC, AL]
sectors:
  - BANKING
  - employment
  - tax
  - consumer-protection
  - corporate-governance
default_cadence_hours: 24

documents:
  # =====================================================================
  # The "always changing" demo signal. Short cadence so the claim loop
  # touches it every demo session. Native IE/corporate-governance —
  # neither demo client sees this; admin does.
  # =====================================================================
  - id: "8064194"           # IE — CRO Social Media Policy
    sector: corporate-governance
    cadence_hours: 1

  # =====================================================================
  # UK relabels (10) — visible to demo-uk@demo.example.com
  # (subscription = UK / BANKING). Picked from English-language /
  # common-law / accessible-content fixtures; sector forced to BANKING
  # so the demo subscription matches.
  # =====================================================================

  # GB Foat v DWP — work-and-pensions tribunal judgment. Already the
  # WU8.1 headline diff: the UK demo client opens this for the diff
  # beat. Synthetic v2 staged under data/samples/synthetic_v2/.
  - id: "28914588"
    jurisdiction: UK
    sector: BANKING

  # IE — Irish Statute Book Act; the dense PART/Section/(a)/(i) fixture.
  # Relabelled to UK so it shows up in the UK list as a long, well-
