# Curated set (WU3.5 → WU8.0). Read by scripts/seed_curated_set.py.
#
# WU8.0 expansion. Targets ~50 documents across ~10 jurisdictions and ~5
# sectors so the demo (~2026-06-08) has a corpus broad enough to exercise
# subscription scoping and the headline clause-diff moment. Sector defaults
# to ``sectors[0]`` (BANKING); per-document overrides switch the rest.
# See docs/seeding.md for schema + semantics.
#
# Token convention: jurisdictions are ISO-2 (matching ``fixtures.json``) plus
# the synthetic relabels UK and EU used by the demo accounts. Per-doc
# ``jurisdiction:`` overrides relabel a captured fixture onto a demo token
# without forking the upstream capture. Sectors use the canonical taxonomy
# documented in ``packages/horizons-core/src/horizons_core/db/schema.md``
# (BANKING, INSURANCE, …). The WU8.1 demo accounts assume BANKING is the
# headline sector — keep it as ``sectors[0]`` so unannotated docs inherit it.
#
# Note on size: the demo target is ~50 documents but the current fixture
# inventory (``data/samples/fixtures.json``, captured 2026-06-04) caps the
# in-scope set at the ~10 documents below — one per jurisdiction. Growing
# the corpus to ~50 requires re-running ``scripts/fetch_fixtures.py`` with
# a larger ``target_count`` so each jurisdiction contributes multiple
# documents. Tracked as a WU8.0 follow-up in the journal entry; the seed
# script will pick up the extra rows on the next run with no code change.

jurisdictions: [IE, GB, EU, BE, AT, DE, FR, IT, ES, DK]
sectors:
  - BANKING
  - employment
  - tax
  - consumer-protection
  - corporate-governance
default_cadence_hours: 24

documents:
  # The "always changing" demo signal — short cadence so the claim loop
  # touches it every demo session. Stays under corporate-governance
  # because the underlying fixture is a corporate-registry policy.
  - id: "8064194"           # IE — CRO Social Media Policy
    sector: corporate-governance
    cadence_hours: 1

  # GB Foat v DWP — work-and-pensions tribunal judgment. Relabelled to
  # (UK, BANKING) for the WU8.1 demo: this is the synthetic v2 the UK
  # demo client (subscription = UK / BANKING) clicks during the headline
  # diff beat. The fixture content is employment-tribunal in origin but
  # the demo treats it as the UK banking headline; replace with a real
  # UK banking fixture once one is captured.
  - id: "28914588"
    jurisdiction: UK
    sector: BANKING

  # EU — BEREC press item on the Digital Networks Act. Retagged to
  # BANKING for the demo (consumer-protection in origin) so the
  # subscription scope tokens line up — but there is no synthetic v2 for
  # this id, so the EU demo client gets its visible diff from the FR
  # relabel below, not from this row.
  - id: "31366184"
    sector: BANKING

  # BE — FPS Labour psychosocial risks questionnaire.
  - id: "19194112"
    sector: employment

  # AT — BVwG administrative court decision; stays under BANKING (the
  # default) because the substantive area is administrative oversight of
  # state economic activity. Reviewable post-demo.
  - id: "32061749"

  # DE — Arbeitsmarkt monthly report (labour-market statistics).
  - id: "20951816"
    sector: employment

  # FR — ACPR (banque-france) prudential decision; the canonical banking-
  # regulator fixture. Relabelled to (EU, BANKING) for the WU8.1 demo so
  # the EU demo client has a synthetic v2 to click. ACPR participates in
  # the EU banking-union supervisory chain, so the relabel is defensible
  # for a public showcase; revert once a true EU banking v2 is captured.
  - id: "31702142"
    jurisdiction: EU
    sector: BANKING

  # IT — MEF economic and financial document update.
  - id: "26863"

  # ES — Manual práctico IVA (Spanish VAT practical manual).
  - id: "28885109"
    sector: tax

  # DK — Central-government financing requirements; BANKING.
  - id: "18087738"
