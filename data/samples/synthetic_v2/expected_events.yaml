# Gold-file expected events for the synthetic v1↔v2 pairs in this
# directory. One entry per fixture; each entry lists the editorial
# changes documented in README.md as (change_type, before_path,
# after_path) tuples. Paths are tuples of strings as produced by
# horizons_core.core.alignment.parser.parse.
#
# Scoring (see tests/alignment/test_synthetic_v2.py):
#
#   TP = aligner emitted an event matching (change_type + paths) here
#   FP = aligner emitted an event not listed here (e.g. cascading
#        paragraph renumbers triggered by an insertion)
#   FN = aligner failed to emit an event listed here
#
# Path notes:
#
#   * Heading-anchored clauses use the slugified heading text; the
#     parser's slugifier strips diacritics and lowercases. Long slugs
#     are truncated to 64 chars (see parser._slug).
#   * Numbering-labelled clauses (PART 2, section 12., (a), (iv))
#     keep their label verbatim in the path.
#   * Unnumbered body paragraphs under a heading get synthesised
#     ``#N`` segments, 1-indexed within the parent heading.
#
# When an editorial "remove this paragraph" affects both the
# paragraph's heading line and its body content, both are listed
# (the parser sees them as separate leaves).

fixtures:

  # CRO Social Media Policy — REMOVE "Following and Retweets" Twitter
  # section, MODIFY Twitter availability hours, ADD new BlueSky
  # section. The "Following and Retweets" removal covers both the
  # heading line and the body paragraph below it.
  ie-8064194:
    events:
      - change_type: MODIFIED
        before_path: [availability, "#1"]
        after_path: [availability, "#1"]
      - change_type: REMOVED
        before_path: [content, "#3"]   # "Following and Retweets" heading line
      - change_type: REMOVED
        before_path: [content, "#4"]   # body paragraph below it
      - change_type: ADDED
        after_path: [bluesky-cro-ie, "#1"]

  # Foat v DWP — REMOVE paragraph 13 (aggravated/exemplary damages),
  # MODIFY paragraph 9 (ACAS uplift 2%→5%), ADD paragraph 9A. Two
  # consistency fixes (c95911f): paragraph 29 restated the 2% uplift +
  # £6,355.79 figure and was updated to 5%; paragraph 34 still dangled
  # on "aggravated and exemplary damages" after paragraph 13 was
  # removed and had that phrase trimmed.
  gb-28914588:
    events:
      - change_type: REMOVED
        before_path: ["#40"]
      - change_type: MODIFIED
        before_path: ["#34"]
        after_path: ["#34"]
      - change_type: ADDED
        after_path: ["#35"]
      - change_type: MODIFIED
        before_path: ["210.", "#10"]    # consistency fix: para 29 uplift restatement
        after_path: ["210.", "#10"]
      - change_type: MODIFIED
        before_path: ["210.", "#21"]    # consistency fix: para 34 damages phrase
        after_path: ["210.", "#21"]

  # ACPR Société Générale — REMOVE paragraph 43 (2025 financials),
  # MODIFY paragraph 44 (penalty 20→25 M€), ADD paragraph 45
  # (aggravating factors). One consistency fix (c95911f): ARTICLE
  # 1ER of the dispositif still cited 20 M€ after paragraph 44 was
  # modified to 25 M€ and was brought into line.
  fr-31702142:
    events:
      - change_type: REMOVED
        before_path: [grief-5, "#43"]
      - change_type: MODIFIED
        before_path: [grief-5, "#44"]
        after_path: [grief-5, "#43"]
      - change_type: ADDED
        after_path: [grief-5, "#44"]
      - change_type: MODIFIED
        before_path: [décide, "#1"]     # consistency fix: ARTICLE 1ER 20→25 M€
        after_path: [décide, "#1"]

  # BA Arbeitsmarkt — REMOVE Statistikseite link, MODIFY headline
  # statistics (3.070.000 → 3.105.000), ADD Saisonbereinigung section.
  # One consistency fix (c95911f): the opening narrative restated
  # the old 3.070.000 total and was updated to 3.105.000. The aligner
  # emits this short-body edit as REMOVED + ADDED at ['#2'] rather
  # than MODIFIED — encoded here as the editorial intent so the
  # detection failure surfaces as a recall miss in the score table.
  de-20951816:
    events:
      - change_type: REMOVED
        before_path: [ausbildungsmarkt, "#2"]
      - change_type: MODIFIED
        before_path: [arbeitslosigkeit-unterbeschäftigung-und-erwerbslosigkeit, "#1"]
        after_path: [arbeitslosigkeit-unterbeschäftigung-und-erwerbslosigkeit, "#1"]
      - change_type: ADDED
        after_path: [saisonbereinigung, "#1"]
      - change_type: MODIFIED
        before_path: ["#2"]             # consistency fix: opening-narrative restatement
        after_path: ["#2"]

  # MEF Update DEF 2016 — REMOVE opening paragraph of "Public
  # finance to support growth", MODIFY net-borrowing target 2.0%→1.8%
  # under "Budget planning", ADD a Revision Note subsection at the
