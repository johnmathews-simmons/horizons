        after_path: [budget-planning-for-the-years-ahead, "(2)", "#1"]
      - change_type: ADDED
        after_path: [revision-note, "#1"]
      # Table I.1 cell — consistency fix
      - change_type: MODIFIED
        before_path: [table-i-1-public-finance-indicators-of-gdp-1]
        after_path: [table-i-1-public-finance-indicators-of-gdp-1]
      # Table II.2 cell (the one rendered as the budget-planning heading) — consistency fix
      - change_type: MODIFIED
        before_path: [budget-planning-for-the-years-ahead]
        after_path: [budget-planning-for-the-years-ahead]
      # Table III.3 cell — consistency fix
      - change_type: MODIFIED
        before_path: [table-iii-3-cyclically-adjusted-public-finance-of-gdp]
