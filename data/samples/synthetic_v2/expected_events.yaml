      - change_type: MODIFIED
        before_path: [iii-2-public-finance-policy-scenario, "#10"]
        after_path: [iii-2-public-finance-policy-scenario, "#10"]
      # Table I.1 footnote (5) narrative — consistency fix
      - change_type: MODIFIED
        before_path: [table-i-1-public-finance-indicators-of-gdp-1, "(5)", "#4"]
        after_path: [table-i-1-public-finance-indicators-of-gdp-1, "(5)", "#4"]
      # "Public finance to support growth" sibling that was both
      # cascade-shifted (#2 → #1 after the opening paragraph was
      # REMOVED) and content-modified to drop the 2.0% restatement.
      - change_type: MODIFIED
        before_path: [public-finance-to-support-growth-in-the-balances-and-the-composi, "#2"]
        after_path: [public-finance-to-support-growth-in-the-balances-and-the-composi, "#1"]

  # IE Employers' Insolvency Amendment Act — MOVED section 11→11A
  # (body byte-identical), MODIFIED section 12(5A)(a) Minister's
