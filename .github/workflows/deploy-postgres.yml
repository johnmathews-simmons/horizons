name: Deploy Postgres

# Manual-only deploy of the Postgres Flexible Server, split out from the
# routine app-deploy pipeline. Re-asserting the server on every push held
# a control-plane lock that caused repeated `ServerIsBusy` failures in
# the main deploy. The server is stateful — deploy it once per change
# (version bump, SKU change, storage scale), never on routine app pushes.
#
# Triggered exclusively via `workflow_dispatch`. The routine `deploy.yml`
# reads the FQDN from the existing server via `infra/main.bicep`'s
# `existing` lookup, so the server must already exist before `deploy.yml`
# runs against a fresh resource group.

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target GitHub Environment. `staging` is wired today.'
        type: choice
        options:
          - staging
        default: staging
      confirm:
        description: 'Type DEPLOY to confirm. Guard against accidental dispatch — server is stateful.'
        required: true
        default: ''

permissions:
  id-token: write
  contents: read

# Serialise Postgres deploys per environment.
concurrency:
  group: deploy-postgres-${{ github.event.inputs.environment || 'staging' }}
  cancel-in-progress: false

env:
  AZURE_RESOURCE_GROUP: horizons-nonprod

jobs:
  deploy:
    name: Postgres deploy
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}
    steps:
      - name: Verify confirm input
        # Bind the free-text input through env: so the shell never
        # interpolates user-controlled strings directly into the script
        # (workflow-injection guard).
        env:
          CONFIRM: ${{ github.event.inputs.confirm }}
        run: |
          set -euo pipefail
          if [ "$CONFIRM" != "DEPLOY" ]; then
            echo "Refusing to deploy: confirm input must be the literal string DEPLOY"
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Set up Bicep CLI
        run: az bicep install

      - name: Bicep deploy (Postgres only)
        env:
          POSTGRES_ADMIN_PASSWORD: ${{ secrets.POSTGRES_ADMIN_PASSWORD }}
        run: |
          set -euo pipefail
          az deployment group create \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --name "deploy-pgsql-${{ github.run_id }}" \
            --template-file infra/postgres.bicep \
            --parameters @infra/postgres.parameters.example.json \
            --parameters administratorPassword="$POSTGRES_ADMIN_PASSWORD"
          echo "Postgres deploy complete."
