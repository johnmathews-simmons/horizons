[project]
name = "horizons-ingestion"
version = "0.0.0"
description = "Ingestion worker: scheduled fetcher that hits Lawstronaut and writes the corpus."
requires-python = ">=3.13"
dependencies = ["horizons-core"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/horizons_ingestion"]
