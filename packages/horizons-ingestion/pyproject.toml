[project]
name = "horizons-ingestion"
version = "0.0.0"
description = "Ingestion worker: scheduled fetcher that hits Lawstronaut and writes the corpus."
requires-python = ">=3.13"
dependencies = [
    "horizons-core",
    "aiohttp>=3.10",
    "asyncpg>=0.30",
    "azure-identity>=1.18",
    "azure-storage-blob>=12.22",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/horizons_ingestion"]
