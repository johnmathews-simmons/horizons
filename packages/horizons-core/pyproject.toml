[project]
name = "horizons-core"
version = "0.0.0"
description = "Shared library: domain types, schema models, repository base classes, Lawstronaut client."
requires-python = ">=3.13"
dependencies = [
    "pydantic>=2.9",
    "sqlalchemy[asyncio]>=2.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/horizons_core"]
