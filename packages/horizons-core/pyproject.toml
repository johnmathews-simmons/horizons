[project]
name = "horizons-core"
version = "0.0.0"
description = "Shared library: domain types, schema models, repository base classes, Lawstronaut client."
requires-python = ">=3.13"
dependencies = [
    # Migration tooling — horizons-core owns the migration tree, so
    # alembic + psycopg (sync driver) are runtime deps for any image
    # that needs to run migrations. The API image hosts the migration
    # ACA Job via a command override; without these here, --no-dev in
    # the Dockerfile strips them and the job exit-127s.
    "alembic>=1.14",
    "argon2-cffi>=23.1",
    # asyncpg is the async PG driver SQLAlchemy uses for the API +
    # worker connections (HORIZONS_DB_URL is shaped as
    # postgresql+asyncpg://...). Previously dev-only — moved here so
    # runtime images can actually connect to PG.
    "asyncpg>=0.30",
    "azure-identity>=1.19",
    "azure-monitor-opentelemetry>=1.6",
    "azure-monitor-query>=1.4",
    "cachetools>=5.5",
    "datasketch>=1.6",
    "httpx>=0.27",
    "markdown-it-py>=3.0",
    "opentelemetry-instrumentation-fastapi>=0.50b0",
    "opentelemetry-instrumentation-httpx>=0.50b0",
    "opentelemetry-instrumentation-sqlalchemy>=0.50b0",
    "psycopg[binary]>=3.2",
    "pydantic>=2.9",
    "pyjwt[crypto]>=2.9",
    "pyyaml>=6.0",
    "sqlalchemy[asyncio]>=2.0",
    "stamina>=24.3",
    "structlog>=24.4",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/horizons_core"]
# `parser_configs/` ships as a regular subpackage (it has __init__.py),
# so hatchling's default file-inclusion picks up the bundled YAMLs
# automatically — no `force-include` needed.
