[project]
name = "horizons-api"
version = "0.0.0"
description = "Public REST API: the single HTTP surface the webapp and external clients talk to."
requires-python = ">=3.13"
dependencies = [
    "fastapi>=0.115",
    "horizons-core",
    "pydantic[email]>=2.9",
    "uvicorn>=0.32",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/horizons_api"]
